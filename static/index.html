<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spanish Immersion Player</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇪🇸</text></svg>">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <span class="header-logo">🇪🇸</span>
    <h1>Spanish <span>Immersion</span> Player</h1>
    <p>Pick a video — images and emojis appear as words are spoken</p>
  </header>

  <main>
    <div class="level-filters" id="level-filters" style="display:none">
      <button class="level-filter active" data-level="all">All</button>
      <button class="level-filter" data-level="Super Beginner">Super Beginner</button>
      <button class="level-filter" data-level="Beginner">Beginner</button>
      <button class="level-filter" data-level="Intermediate">Intermediate</button>
      <button class="level-filter" data-level="Advanced">Advanced</button>
    </div>
    <div id="video-grid" class="video-grid">
      <div class="grid-loading">Loading videos…</div>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-brand">
        <span>🇪🇸</span>
        <span class="footer-brand-name">Spanish Immersion Player</span>
      </div>
      <p class="footer-tagline">Learn Spanish through comprehensible input &nbsp;·&nbsp; <span id="app-version">v0.0.0</span></p>
    </div>
  </footer>

  <script src="home.js"></script>
</body>
</html>
